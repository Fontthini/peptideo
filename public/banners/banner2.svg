<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="55%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0fdf4"/>
    </linearGradient>
    <linearGradient id="stripe2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="vialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#16a34a" flood-opacity="0.15"/>
    </filter>
    <filter id="cardshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg2)"/>

  <!-- Top green accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#stripe2)"/>
  <!-- Bottom green accent bar -->
  <rect x="0" y="394" width="1200" height="6" fill="url(#stripe2)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#16a34a" stroke-width="0.3" opacity="0.2"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- RIGHT SIDE: Vial illustration group -->
  <!-- Vial 1 (large, center) -->
  <g transform="translate(820, 60)" filter="url(#shadow2)">
    <!-- Cap -->
    <rect x="28" y="0" width="44" height="18" rx="4" fill="#1e293b"/>
    <rect x="32" y="4" width="36" height="10" rx="2" fill="#334155" opacity="0.5"/>
    <!-- Neck -->
    <rect x="33" y="18" width="34" height="12" fill="#e2e8f0"/>
    <!-- Body -->
    <rect x="20" y="30" width="60" height="180" rx="10" fill="url(#vialGrad)" opacity="0.9"/>
    <!-- Label -->
    <rect x="22" y="65" width="56" height="80" rx="4" fill="white" opacity="0.92"/>
    <rect x="22" y="65" width="56" height="8" rx="4" fill="#16a34a"/>
    <text x="50" y="74" text-anchor="middle" font-family="Arial" font-size="6.5" font-weight="700" fill="white">PEPTIDEZ</text>
    <text x="50" y="87" text-anchor="middle" font-family="Arial" font-size="7.5" font-weight="700" fill="#1e293b">BPC-157</text>
    <text x="50" y="98" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">5mg / vial</text>
    <line x1="28" y1="104" x2="72" y2="104" stroke="#e2e8f0" stroke-width="1"/>
    <text x="50" y="116" text-anchor="middle" font-family="Arial" font-size="5.5" fill="#16a34a">Pureza ≥98%</text>
    <text x="50" y="128" text-anchor="middle" font-family="Arial" font-size="5" fill="#94a3b8">Lote: PZ-2026</text>
    <!-- Liquid -->
    <rect x="20" y="155" width="60" height="52" rx="8" fill="rgba(16,163,74,0.12)"/>
    <!-- Shine -->
    <rect x="24" y="32" width="8" height="140" rx="4" fill="white" opacity="0.3"/>
  </g>

  <!-- Vial 2 (smaller, left) -->
  <g transform="translate(720, 110)" filter="url(#shadow2)">
    <rect x="20" y="0" width="32" height="13" rx="3" fill="#1e293b"/>
    <rect x="24" y="13" width="24" height="9" fill="#e2e8f0"/>
    <rect x="14" y="22" width="44" height="130" rx="8" fill="url(#vialGrad)" opacity="0.8"/>
    <rect x="16" y="46" width="40" height="60" rx="3" fill="white" opacity="0.88"/>
    <rect x="16" y="46" width="40" height="7" rx="3" fill="#0369a1"/>
    <text x="36" y="52" text-anchor="middle" font-family="Arial" font-size="5" font-weight="700" fill="white">PEPTIDEZ</text>
    <text x="36" y="63" text-anchor="middle" font-family="Arial" font-size="6" font-weight="700" fill="#1e293b">TB-500</text>
    <text x="36" y="74" text-anchor="middle" font-family="Arial" font-size="5" fill="#64748b">2mg / vial</text>
    <rect x="14" y="118" width="44" height="32" rx="6" fill="rgba(3,105,161,0.1)"/>
    <rect x="18" y="24" width="6" height="100" rx="3" fill="white" opacity="0.25"/>
  </g>

  <!-- Vial 3 (smaller, right) -->
  <g transform="translate(980, 120)" filter="url(#shadow2)">
    <rect x="20" y="0" width="32" height="13" rx="3" fill="#1e293b"/>
    <rect x="24" y="13" width="24" height="9" fill="#e2e8f0"/>
    <rect x="14" y="22" width="44" height="120" rx="8" fill="url(#vialGrad)" opacity="0.8"/>
    <rect x="16" y="42" width="40" height="60" rx="3" fill="white" opacity="0.88"/>
    <rect x="16" y="42" width="40" height="7" rx="3" fill="#7c3aed"/>
    <text x="36" y="48" text-anchor="middle" font-family="Arial" font-size="5" font-weight="700" fill="white">PEPTIDEZ</text>
    <text x="36" y="60" text-anchor="middle" font-family="Arial" font-size="5.5" font-weight="700" fill="#1e293b">GHK-Cu</text>
    <text x="36" y="71" text-anchor="middle" font-family="Arial" font-size="5" fill="#64748b">5mg / vial</text>
    <rect x="14" y="110" width="44" height="30" rx="6" fill="rgba(124,58,237,0.1)"/>
    <rect x="18" y="24" width="6" height="92" rx="3" fill="white" opacity="0.25"/>
  </g>

  <!-- LEFT CONTENT -->
  <!-- Brand tag -->
  <rect x="80" y="72" width="180" height="26" rx="13" fill="#16a34a"/>
  <text x="170" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="1.5">PEPTIDEZ HEALTH</text>

  <!-- Main title -->
  <text x="80" y="162" font-family="Arial, sans-serif" font-size="50" font-weight="900" fill="#0f172a" letter-spacing="-1.5">Peptídeos</text>
  <text x="80" y="218" font-family="Arial, sans-serif" font-size="50" font-weight="900" fill="#16a34a" letter-spacing="-1.5">Certificados</text>

  <!-- Purity badge -->
  <rect x="80" y="235" width="190" height="36" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#cardshadow)"/>
  <text x="97" y="250" font-family="Arial, sans-serif" font-size="11" fill="#16a34a">✦</text>
  <text x="114" y="250" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#15803d">PUREZA ≥98%</text>
  <text x="97" y="264" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">Garantia de qualidade farmacêutica</text>

  <!-- Feature cards row -->
  <!-- Card 1 -->
  <rect x="80" y="296" width="140" height="52" rx="8" fill="white" filter="url(#cardshadow)"/>
  <rect x="80" y="296" width="4" height="52" rx="2" fill="#16a34a"/>
  <text x="95" y="315" font-family="Arial, sans-serif" font-size="18">🌡️</text>
  <text x="120" y="315" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0f172a">Cadeia de Frio</text>
  <text x="120" y="329" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Envio refrigerado</text>

  <!-- Card 2 -->
  <rect x="232" y="296" width="140" height="52" rx="8" fill="white" filter="url(#cardshadow)"/>
  <rect x="232" y="296" width="4" height="52" rx="2" fill="#0369a1"/>
  <text x="247" y="315" font-family="Arial, sans-serif" font-size="18">🔬</text>
  <text x="272" y="315" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0f172a">Laudo Analítico</text>
  <text x="272" y="329" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Certificado por lote</text>

  <!-- Card 3 -->
  <rect x="384" y="296" width="140" height="52" rx="8" fill="white" filter="url(#cardshadow)"/>
  <rect x="384" y="296" width="4" height="52" rx="2" fill="#7c3aed"/>
  <text x="399" y="315" font-family="Arial, sans-serif" font-size="18">🏥</text>
  <text x="424" y="315" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0f172a">Uso Médico</text>
  <text x="424" y="329" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Prescrição necessária</text>
</svg>
