<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg2)"/>

  <!-- Right dark panel -->
  <rect x="820" y="0" width="380" height="320" fill="#0f172a" opacity="0.06"/>

  <!-- Fine dot grid (left side) -->
  <g opacity="0.18" fill="#16a34a">
    <circle cx="40" cy="40" r="2"/><circle cx="100" cy="40" r="2"/><circle cx="160" cy="40" r="2"/>
    <circle cx="40" cy="100" r="2"/><circle cx="100" cy="100" r="2"/><circle cx="160" cy="100" r="2"/>
    <circle cx="40" cy="160" r="2"/><circle cx="100" cy="160" r="2"/><circle cx="160" cy="160" r="2"/>
    <circle cx="40" cy="220" r="2"/><circle cx="100" cy="220" r="2"/><circle cx="160" cy="220" r="2"/>
    <circle cx="40" cy="280" r="2"/><circle cx="100" cy="280" r="2"/><circle cx="160" cy="280" r="2"/>
  </g>

  <!-- Large abstract circle outline (decorative) -->
  <circle cx="1050" cy="160" r="140" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.12"/>
  <circle cx="1050" cy="160" r="100" fill="none" stroke="#16a34a" stroke-width="1" opacity="0.10"/>
  <circle cx="1050" cy="160" r="58" fill="#16a34a" opacity="0.07"/>

  <!-- Main content -->
  <!-- Tag pill -->
  <rect x="220" y="94" width="148" height="22" rx="11" fill="#16a34a"/>
  <text x="294" y="109" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">NOVIDADES</text>

  <text x="220" y="162" font-family="system-ui, sans-serif" font-size="44" font-weight="900" fill="#0f172a">Protocolos</text>
  <text x="220" y="212" font-family="system-ui, sans-serif" font-size="44" font-weight="900" fill="#15803d">Clínicos</text>
  <text x="220" y="247" font-family="system-ui, sans-serif" font-size="15" fill="#4b5563" font-weight="400">Guias práticos, doses e estratégias atualizadas.</text>

  <!-- Bottom accent line -->
  <rect x="220" y="268" width="60" height="3" rx="2" fill="#16a34a"/>
  <rect x="288" y="268" width="20" height="3" rx="2" fill="#16a34a" opacity="0.4"/>
</svg>
