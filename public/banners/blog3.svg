<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16"/>
      <stop offset="60%" style="stop-color:#14532d"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg3)"/>

  <!-- Wave lines -->
  <path d="M0,100 Q200,60 400,100 Q600,140 800,100 Q1000,60 1200,100" fill="none" stroke="url(#wave)" stroke-width="1" opacity="0.6"/>
  <path d="M0,130 Q200,90 400,130 Q600,170 800,130 Q1000,90 1200,130" fill="none" stroke="url(#wave)" stroke-width="1" opacity="0.5"/>
  <path d="M0,160 Q200,120 400,160 Q600,200 800,160 Q1000,120 1200,160" fill="none" stroke="url(#wave)" stroke-width="1.5" opacity="0.7"/>
  <path d="M0,190 Q200,150 400,190 Q600,230 800,190 Q1000,150 1200,190" fill="none" stroke="url(#wave)" stroke-width="1" opacity="0.5"/>
  <path d="M0,220 Q200,180 400,220 Q600,260 800,220 Q1000,180 1200,220" fill="none" stroke="url(#wave)" stroke-width="1" opacity="0.4"/>

  <!-- Right glow -->
  <ellipse cx="1050" cy="160" rx="220" ry="120" fill="#16a34a" opacity="0.06"/>

  <!-- Left panel text area subtle bg -->
  <rect x="0" y="0" width="560" height="320" fill="#000" opacity="0.18"/>

  <!-- Tag -->
  <rect x="80" y="90" width="128" height="22" rx="11" fill="#22c55e" opacity="0.2"/>
  <text x="144" y="105" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="2">ESTUDOS &amp; CIÊNCIA</text>

  <!-- Main text -->
  <text x="80" y="168" font-family="system-ui, sans-serif" font-size="44" font-weight="900" fill="#ffffff">Atualizações</text>
  <text x="80" y="218" font-family="system-ui, sans-serif" font-size="44" font-weight="900" fill="#4ade80">Recentes</text>

  <!-- Divider + subtitle -->
  <rect x="80" y="233" width="320" height="1" fill="#22c55e" opacity="0.3"/>
  <text x="80" y="258" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.65)" font-weight="400">Os últimos estudos em peptidoterapia.</text>

  <!-- Small decorative dots right side -->
  <circle cx="850" cy="80"  r="3" fill="#22c55e" opacity="0.5"/>
  <circle cx="920" cy="240" r="3" fill="#22c55e" opacity="0.4"/>
  <circle cx="1100" cy="100" r="2" fill="#22c55e" opacity="0.4"/>
  <circle cx="1000" cy="270" r="2" fill="#22c55e" opacity="0.35"/>
</svg>
