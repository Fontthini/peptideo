<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="60%" style="stop-color:#0f2a1a"/>
      <stop offset="100%" style="stop-color:#052010"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="orb" cx="70%" cy="50%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.25"/>
      <stop offset="60%" style="stop-color:#0f172a;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg1)"/>
  <rect width="1200" height="400" fill="url(#orb)"/>

  <!-- Left green stripe -->
  <rect x="0" y="0" width="5" height="400" fill="#22c55e"/>

  <!-- Green glow blob -->
  <ellipse cx="850" cy="200" rx="280" ry="200" fill="url(#glow)" filter="url(#blur1)"/>

  <!-- Molecular network right side -->
  <!-- Nodes -->
  <circle cx="980" cy="120" r="6" fill="#22c55e" opacity="0.8"/>
  <circle cx="1050" cy="180" r="9" fill="#22c55e" opacity="0.6"/>
  <circle cx="1100" cy="100" r="5" fill="#4ade80" opacity="0.7"/>
  <circle cx="1140" cy="200" r="7" fill="#22c55e" opacity="0.5"/>
  <circle cx="1080" cy="280" r="6" fill="#16a34a" opacity="0.7"/>
  <circle cx="1020" cy="300" r="4" fill="#4ade80" opacity="0.6"/>
  <circle cx="940" cy="260" r="8" fill="#22c55e" opacity="0.5"/>
  <circle cx="900" cy="160" r="5" fill="#4ade80" opacity="0.6"/>
  <circle cx="1160" cy="300" r="4" fill="#22c55e" opacity="0.4"/>
  <circle cx="870" cy="320" r="3" fill="#22c55e" opacity="0.4"/>
  <!-- Bonds -->
  <line x1="980" y1="120" x2="1050" y2="180" stroke="#22c55e" stroke-width="1.5" opacity="0.35"/>
  <line x1="1050" y1="180" x2="1100" y2="100" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <line x1="1050" y1="180" x2="1140" y2="200" stroke="#22c55e" stroke-width="1" opacity="0.25"/>
  <line x1="1050" y1="180" x2="1080" y2="280" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
  <line x1="1080" y1="280" x2="1020" y2="300" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <line x1="1080" y1="280" x2="1140" y2="200" stroke="#22c55e" stroke-width="1" opacity="0.2"/>
  <line x1="1020" y1="300" x2="940" y2="260" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <line x1="940" y1="260" x2="900" y2="160" stroke="#22c55e" stroke-width="1" opacity="0.25"/>
  <line x1="900" y1="160" x2="980" y2="120" stroke="#22c55e" stroke-width="1" opacity="0.25"/>
  <line x1="1140" y1="200" x2="1160" y2="300" stroke="#22c55e" stroke-width="1" opacity="0.2"/>
  <line x1="1080" y1="280" x2="1160" y2="300" stroke="#22c55e" stroke-width="1" opacity="0.2"/>
  <line x1="940" y1="260" x2="870" y2="320" stroke="#22c55e" stroke-width="1" opacity="0.2"/>

  <!-- Floating dots pattern -->
  <circle cx="700" cy="80" r="2" fill="#22c55e" opacity="0.3"/>
  <circle cx="750" cy="340" r="2" fill="#22c55e" opacity="0.25"/>
  <circle cx="820" cy="60" r="1.5" fill="#4ade80" opacity="0.3"/>
  <circle cx="780" cy="370" r="1.5" fill="#22c55e" opacity="0.2"/>

  <!-- LEFT CONTENT -->
  <!-- Tag pill -->
  <rect x="80" y="80" width="220" height="28" rx="14" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="97" cy="94" r="4" fill="#22c55e"/>
  <text x="110" y="98.5" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#22c55e" letter-spacing="1.5">PEPTIDEZ HEALTH</text>

  <!-- Main title -->
  <text x="80" y="172" font-family="Arial, sans-serif" font-size="54" font-weight="900" fill="#ffffff" letter-spacing="-1">Otimização</text>
  <text x="80" y="232" font-family="Arial, sans-serif" font-size="54" font-weight="900" fill="#22c55e" letter-spacing="-1">Bioativa</text>

  <!-- Subtitle -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.65)" letter-spacing="0.3">Peptídeos Terapêuticos para Prescrição Médica</text>

  <!-- Divider -->
  <line x1="80" y1="305" x2="380" y2="305" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>

  <!-- Features row -->
  <circle cx="89" cy="330" r="3" fill="#22c55e"/>
  <text x="100" y="334.5" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Pureza ≥98%</text>
  <circle cx="210" cy="330" r="3" fill="#22c55e"/>
  <text x="221" y="334.5" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Cadeia de Frio</text>
  <circle cx="345" cy="330" r="3" fill="#22c55e"/>
  <text x="356" y="334.5" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Acesso Exclusivo</text>

  <!-- Bottom bar -->
  <rect x="0" y="380" width="1200" height="20" fill="rgba(34,197,94,0.08)"/>
  <text x="80" y="394" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="2">© 2026 PEPTIDEZ HEALTH · OTIMIZAÇÃO BIOATIVA · REGENERAÇÃO CELULAR</text>
</svg>
