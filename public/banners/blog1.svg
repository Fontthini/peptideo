<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg1)"/>

  <!-- Subtle horizontal grid lines -->
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="128" x2="1200" y2="128" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="192" x2="1200" y2="192" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="256" x2="1200" y2="256" stroke="#1e293b" stroke-width="1"/>

  <!-- Vertical accent bar -->
  <rect x="80" y="80" width="4" height="160" fill="#16a34a" rx="2"/>

  <!-- Molecule dots connected -->
  <circle cx="940" cy="100" r="6" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.6"/>
  <circle cx="1020" cy="145" r="4" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.4"/>
  <circle cx="980" cy="210" r="8" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="1060" cy="200" r="5" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.35"/>
  <circle cx="1100" cy="120" r="4" fill="none" stroke="#16a34a" stroke-width="1" opacity="0.3"/>
  <line x1="940" y1="100" x2="1020" y2="145" stroke="#16a34a" stroke-width="1" opacity="0.3"/>
  <line x1="1020" y1="145" x2="980" y2="210" stroke="#16a34a" stroke-width="1" opacity="0.3"/>
  <line x1="980" y1="210" x2="1060" y2="200" stroke="#16a34a" stroke-width="1" opacity="0.25"/>
  <line x1="1060" y1="200" x2="1100" y2="120" stroke="#16a34a" stroke-width="1" opacity="0.25"/>
  <line x1="1100" y1="120" x2="940" y2="100" stroke="#16a34a" stroke-width="1" opacity="0.2"/>

  <!-- Tag -->
  <rect x="104" y="96" width="160" height="22" rx="11" fill="#16a34a" opacity="0.15"/>
  <text x="184" y="111" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="2">ÁREA DE MEMBROS</text>

  <!-- Main headline -->
  <text x="104" y="165" font-family="system-ui, sans-serif" font-size="42" font-weight="900" fill="#ffffff">Conteúdo</text>
  <text x="104" y="215" font-family="system-ui, sans-serif" font-size="42" font-weight="900" fill="#16a34a">Científico</text>

  <!-- Subtitle -->
  <text x="104" y="248" font-family="system-ui, sans-serif" font-size="15" fill="#64748b" font-weight="400">Artigos, vídeos e materiais exclusivos para profissionais de saúde.</text>
</svg>
